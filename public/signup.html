<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Join Connectik</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">
  <section class="login-card">
    <!-- Step 1: details -->
    <div id="signup-step-form">
      <h2>Let's connect &amp; explore!</h2>
      <p class="sub">Create your professional account in seconds.</p>
      <form id="signup-form" novalidate autocomplete="on">
        <div class="field"><label>Full Name</label><input id="name" name="name" type="text" placeholder="Jane Doe" autocomplete="name" required /></div>
        <div class="field"><label>Headline (optional)</label><input id="headline" name="headline" type="text" placeholder="Software Engineer at Acme" autocomplete="organization-title" /></div>
        <div class="field"><label>Email Address</label><input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required /></div>
        <div class="field"><label>Password</label><input id="password" name="password" type="password" placeholder="Min 8 chars, mixed case, number & symbol" autocomplete="new-password" required /></div>
        <p class="center-muted" style="font-size:12px;text-align:left;margin:-4px 0 4px">Use 8+ characters with uppercase, lowercase, a number and a special character.</p>
        <p id="signup-error" class="error"></p>
        <button class="btn btn-primary btn-block" type="submit">Create Account</button>
        <p class="center-muted">Already a member? <a class="link" href="/">Sign in</a></p>
      </form>
    </div>

    <!-- Step 2: OTP verification -->
    <div id="signup-step-otp" style="display:none">
      <h2>Verify your email</h2>
      <p class="sub">Enter the 6-digit code we emailed to <strong id="otp-email-label"></strong>.</p>
      <div class="field">
        <label>Verification code</label>
        <input id="otp-input" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="123456" style="letter-spacing:8px;font-size:20px;text-align:center" />
      </div>
      <p id="otp-error" class="error"></p>
      <button class="btn btn-primary btn-block" id="otp-verify-btn" type="button">Verify &amp; continue</button>
      <p class="center-muted">
        Didn't get it? <a class="link" id="otp-resend" href="#">Resend code</a>
        &nbsp;Â·&nbsp; <a class="link" id="otp-back" href="#">Change email</a>
      </p>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    (function () {
      const formStep = document.getElementById('signup-step-form');
      const otpStep  = document.getElementById('signup-step-otp');
      const err      = document.getElementById('signup-error');
      const otpErr   = document.getElementById('otp-error');
      let pendingEmail = '';

      function showOtpStep(email, devOtp) {
        pendingEmail = email;
        document.getElementById('otp-email-label').textContent = email;
        formStep.style.display = 'none';
        otpStep.style.display = '';
        otpErr.style.color = ''; otpErr.textContent = devOtp ? ('Dev code: ' + devOtp) : '';
        document.getElementById('otp-input').focus();
      }

      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const headline = document.getElementById('headline').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        err.style.color = ''; err.textContent = '';
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true; btn.textContent = 'Sending codeâ€¦';
        try {
          const data = await api('/api/auth/signup', { method: 'POST', body: { name, email, password, headline } });
          if (data.needs_otp) showOtpStep(data.email || email.toLowerCase(), data.dev_otp);
        } catch (ex) {
          const msg = (ex && ex.message) || 'Signup failed.';
          if (/already registered/i.test(msg)) {
            err.innerHTML = 'Email already registered. <a class="link" href="/">Please login</a>.';
          } else {
            err.textContent = msg;
          }
        } finally {
          btn.disabled = false; btn.textContent = 'Create Account';
        }
      });

      document.getElementById('otp-verify-btn').addEventListener('click', async () => {
        const otp = document.getElementById('otp-input').value.trim();
        otpErr.style.color = ''; otpErr.textContent = '';
        if (!/^\d{6}$/.test(otp)) { otpErr.textContent = 'Enter the 6-digit code.'; return; }
        const btn = document.getElementById('otp-verify-btn');
        btn.disabled = true; btn.textContent = 'Verifyingâ€¦';
        try {
          const data = await api('/api/auth/signup/verify-otp', { method: 'POST', body: { email: pendingEmail, otp } });
          Session.setToken(data.token);
          setMe(data.user);
          location.href = '/feed.html';
        } catch (ex) {
          otpErr.textContent = (ex && ex.message) || 'Verification failed.';
          btn.disabled = false; btn.textContent = 'Verify & continue';
        }
      });

      document.getElementById('otp-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); document.getElementById('otp-verify-btn').click(); }
      });

      document.getElementById('otp-resend').addEventListener('click', async (e) => {
        e.preventDefault();
        otpErr.style.color = ''; otpErr.textContent = 'Sending a new codeâ€¦';
        try {
          const data = await api('/api/auth/signup/resend-otp', { method: 'POST', body: { email: pendingEmail } });
          otpErr.style.color = '#057642';
          otpErr.textContent = data.dev_otp ? ('New dev code: ' + data.dev_otp) : 'A new code is on its way.';
        } catch (ex) {
          otpErr.textContent = (ex && ex.message) || 'Could not resend code.';
        }
      });

      document.getElementById('otp-back').addEventListener('click', (e) => {
        e.preventDefault();
        otpStep.style.display = 'none';
        formStep.style.display = '';
        err.textContent = '';
      });
    })();
  </script>
</body>
</html>
