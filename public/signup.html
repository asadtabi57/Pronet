<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Join ProNet</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">
  <section class="login-card">
    <h2>Join ProNet</h2>
    <p class="sub">Create your professional account in seconds.</p>
    <form id="signup-form" novalidate autocomplete="on">
      <div class="field"><label>Full Name</label><input id="name" name="name" type="text" placeholder="Jane Doe" autocomplete="name" required /></div>
      <div class="field"><label>Headline (optional)</label><input id="headline" name="headline" type="text" placeholder="Software Engineer at Acme" autocomplete="organization-title" /></div>
      <div class="field"><label>Email Address</label><input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required /></div>
      <div class="field"><label>Password</label><input id="password" name="password" type="password" placeholder="At least 6 characters" autocomplete="new-password" required /></div>
      <p id="signup-error" class="error"></p>
      <button class="btn btn-primary btn-block" type="submit">Create Account</button>
      <p class="center-muted">Already a member? <a class="link" href="/">Sign in</a></p>
    </form>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const headline = document.getElementById('headline').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const err = document.getElementById('signup-error');
      err.style.color = ''; err.textContent = '';

      async function backendSignup() {
        const data = await api('/api/auth/signup', { method: 'POST', body: { name, email, password, headline } });
        err.style.color = '#057642';
        let msg = data.message || 'Account created. Check your email to verify.';
        if (data.dev_verify_link) msg += ' (dev link: ' + data.dev_verify_link + ')';
        err.textContent = msg;
      }

      if (!window.sb) {
        try { await backendSignup(); } catch (ex) { err.textContent = ex.message; }
        return;
      }
      try {
        const { data, error } = await window.sb.auth.signUp({
          email, password,
          options: {
            data: { full_name: name, headline },
            emailRedirectTo: location.origin + '/auth-callback.html',
          },
        });
        if (error) throw error;
        if (data.session) {
          Session.setToken(data.session.access_token);
          try {
            const me = await api('/api/me');
            if (headline && !me.user.headline) {
              await api('/api/me', { method: 'PUT', body: { headline } });
            }
          } catch (ex) {}
          location.href = '/feed.html';
        } else {
          err.style.color = '#057642';
          err.textContent = 'Account created! Check your email to confirm, then sign in.';
        }
      } catch (ex) {
        // Fallback to backend signup so verification still works if Supabase is misconfigured
        try { await backendSignup(); }
        catch (ex2) { err.textContent = ex.message || ex2.message; }
      }
    });
  </script>
</body>
</html>
