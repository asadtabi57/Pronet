<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Connectik — Feed</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="app">
  <header class="app-nav" id="top-nav"></header>
  <main class="layout three">
    <aside>
      <div class="card profile-card" id="me-card"></div>
    </aside>
    <section>
      <div id="ai-digest"></div>
      <div class="card">
        <div class="composer">
          <div id="composer-avatar"></div>
          <textarea id="post-content" placeholder="Start a post… (text required, or add media below)"></textarea>
        </div>
        <div class="media-input" id="media-input">
          <div class="media-input-row">
            <select id="media-type">
              <option value="image">📷 Image URL</option>
              <option value="video">🎬 Video URL (mp4 or YouTube)</option>
            </select>
            <input id="media-url" placeholder="https://…" />
          </div>
          <div class="media-input-row">
            <label class="media-upload-btn" for="media-file">⬆️ Upload from device</label>
            <input id="media-file" type="file" accept="image/*,video/*,.heic,.heif" hidden />
            <span class="media-upload-hint">Image ≤ 1 MB · Video ≤ 5 MB</span>
          </div>
          <div id="media-preview" class="media-preview" hidden></div>
        </div>
        <div class="composer-actions">
          <div class="composer-toolbar">
            <button id="toggle-media">📎 Add media</button>
            <button type="button" id="ai-write-btn" class="ai-btn ai-btn-tiny" title="Draft with AI">✨ <span>Write with AI</span></button>
          </div>
          <button id="post-btn" class="btn-fill">Post</button>
        </div>
      </div>
      <div id="posts"></div>
    </section>
    <aside class="people-side">
      <div class="card card-pad side-card">
        <h4>People you may know</h4>
        <div id="people-list"></div>
      </div>
    </aside>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/ai.js"></script>
  <script src="/js/calls.js"></script>
  <script src="/js/posts.js"></script>
  <script src="/js/feed.js"></script>
</body>
</html>
