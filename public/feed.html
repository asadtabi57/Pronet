<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ProNet — Feed</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="app">
  <header class="app-nav" id="top-nav"></header>
  <main class="layout three">
    <aside>
      <div class="card profile-card" id="me-card"></div>
    </aside>
    <section>
      <div class="card">
        <div class="composer">
          <div id="composer-avatar"></div>
          <textarea id="post-content" placeholder="Start a post… (text required, or add media below)"></textarea>
        </div>
        <div class="media-input" id="media-input">
          <select id="media-type">
            <option value="image">📷 Image URL</option>
            <option value="video">🎬 Video URL (mp4 or YouTube)</option>
          </select>
          <input id="media-url" placeholder="https://…" />
        </div>
        <div class="composer-actions">
          <div class="composer-toolbar">
            <button id="toggle-media">📎 Add media</button>
          </div>
          <button id="post-btn" class="btn-fill">Post</button>
        </div>
      </div>
      <div id="posts"></div>
    </section>
    <aside class="people-side">
      <div class="card card-pad side-card">
        <h4>People you may know</h4>
        <div id="people-list"></div>
      </div>
    </aside>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/posts.js"></script>
  <script src="/js/feed.js"></script>
</body>
</html>
