<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pronet — Offline</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:#f5f6fc; color:#1f2937; display:flex; min-height:100vh; align-items:center; justify-content:center; }
    .wrap { text-align:center; padding:32px; }
    .logo { width:72px; height:72px; border-radius:18px; background:linear-gradient(135deg,#4f46e5,#3f37c9);
      color:#fff; font-weight:800; font-size:36px; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
    h1 { font-size:22px; margin:0 0 8px; }
    p { color:#6b7280; margin:0 0 20px; }
    button { background:#4f46e5; color:#fff; border:0; border-radius:999px; padding:12px 24px; font-size:15px; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">P</div>
    <h1>You're offline</h1>
    <p>Pronet needs a connection for this. Check your network and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
